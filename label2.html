    Carved Wooden Comb 
    Wood, Palm Kernel Oil
West Africa, Late 19th Century - Early 20th Century

In many West African cultures, the practice of carving wooden combs was done for both grooming and symbolic uses. The combs were carved by mothers and typically handed down to their children and kept within the family for many generations. These highly intricate combs were also created by skilled artisans who traded them for other items of high value by the Late 19th Century and Early 20th Century. The act of caring for hair was a community activity, shared betweens neighobrs, family, and friends, and would commonly be seen during social gatherings. These Combs symbolized status, family, cultural pride, and tradition. 

More than a tool for grooming!
